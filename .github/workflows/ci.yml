name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - name: Invariant tests
        run: SDL_VIDEODRIVER=dummy python -m pytest tests/ -q
      - name: Headless CLI run saves a PNG
        run: |
          cd src
          SDL_VIDEODRIVER=dummy python maze.py -r 17 --seed 5 --no-display --output /tmp/maze.png
          test -s /tmp/maze.png
